<style>
        /* Custom glowing background effect for high-end feel */
        .ambient-glow {
            background: radial-gradient(circle at 50% -20%, rgba(21, 128, 61, 0.08) 0%, rgba(249, 250, 251, 1) 70%);
        }

        .tech-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
        }

        /* Glassmorphism card specifics */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        /* Input autofill override */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #f9fafb inset !important;
            -webkit-text-fill-color: #111827 !important;
            transition: background-color 5000s ease-in-out 0s;
        }

<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-body-md antialiased ambient-glow tech-grid">
<!-- Main Canvas Content -->
<main class="flex-grow flex items-center justify-center p-6 relative z-10">
<!-- Login Card -->
<div class="glass-card w-full max-w-[440px] rounded-xl p-8 flex flex-col gap-stack-lg relative overflow-hidden group">
<!-- Header / Logo -->
<div class="flex flex-col items-center text-center gap-stack-sm">
<div class="w-16 h-16 rounded-lg bg-gray-50 flex items-center justify-center border border-gray-200 mb-2 shadow-sm">
<span class="material-symbols-outlined text-green-700" style="font-variation-settings: 'FILL' 1; font-size: 32px;">inventory_2</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-gray-900 tracking-tight font-bold">Stock Mr.</h1>
<p class="font-body-md text-body-md text-gray-500">Secure Enterprise Authentication</p>
</div>
<!-- Standard Login Form -->
<form action="#" class="flex flex-col gap-stack-md relative z-10" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-gray-700 ml-1" for="email">Corporate Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-gray-400 select-none pointer-events-none">mail</span>
<input class="w-full h-12 bg-gray-50 border border-gray-200 rounded-lg pl-11 pr-4 font-body-md text-body-md text-gray-900 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition-all placeholder:text-gray-400" id="email" name="email" placeholder="admin@enterprise.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end ml-1">
<label class="font-label-sm text-label-sm text-gray-700" for="password">Password</label>
<a class="font-label-sm text-label-sm text-green-700 hover:text-green-800 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-gray-400 select-none pointer-events-none">lock</span>
<input class="w-full h-12 bg-gray-50 border border-gray-200 rounded-lg pl-11 pr-11 font-body-md text-body-md text-gray-900 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition-all placeholder:text-gray-400" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 text-gray-400 hover:text-gray-600 transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined select-none">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full h-12 bg-green-700 text-white rounded-lg font-label-md text-label-md uppercase tracking-wider font-bold hover:bg-green-800 transition-all duration-200 shadow-md flex justify-center items-center gap-2" type="submit">
<span>Authenticate</span>
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2 relative z-10">
<div class="h-px bg-gray-200 flex-grow"></div>
<span class="font-label-sm text-label-sm text-gray-500 uppercase tracking-widest">Corporate Access</span>
<div class="h-px bg-gray-200 flex-grow"></div>
</div>
<!-- SSO Buttons -->
<div class="flex flex-col gap-3 relative z-10">
<button class="w-full h-12 bg-white border border-gray-200 hover:border-gray-300 hover:bg-gray-50 rounded-lg flex items-center justify-center gap-3 transition-colors duration-200 shadow-sm" type="button">
<!-- Generic domain icon for Azure/Microsoft -->
<span class="material-symbols-outlined text-[#00a4ef]">grid_view</span>
<span class="font-label-md text-label-md text-gray-800">Continue with Azure AD</span>
</button>
<button class="w-full h-12 bg-white border border-gray-200 hover:border-gray-300 hover:bg-gray-50 rounded-lg flex items-center justify-center gap-3 transition-colors duration-200 shadow-sm" type="button">
<!-- Generic icon for Google Workspace -->
<span class="material-symbols-outlined text-green-700">work</span>
<span class="font-label-md text-label-md text-gray-800">Continue with Google Workspace</span>
</button>
</div>
</div>
</main>
<!-- Footer Component -->
<footer class="w-full py-6 mt-auto border-t border-gray-200 bg-white text-gray-500 relative z-10">
<div class="flex flex-col md:flex-row justify-between items-center px-margin-page w-full max-w-container-max mx-auto gap-4">
<div class="flex items-center gap-2">
<span class="font-label-md text-label-md font-bold text-gray-800">Stock Mr.</span>

<a class="font-label-sm text-label-sm text-gray-500 hover:text-gray-800 transition-colors hover:underline decoration-green-700" href="#">API Status</a>
</nav>
</div>
</footer>
